services:
  db:
    image: postgres:16-alpine
    container_name: product-catalog-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin123
      - POSTGRES_DB=product_catalog-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d product_catalog-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      target: api-runner
    container_name: product-catalog-api
    env_file:
      - ./apps/api/.env
    environment:
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://admin:admin123@db:5432/product_catalog-db
      - DIRECT_URL=postgresql://admin:admin123@db:5432/product_catalog-db
    ports:
      - "3001:3001"
    networks:
      - default
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      target: web-runner
    container_name: product-catalog-web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
